version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: rag-mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    volumes:
      - mongo_data:/data/db

  postgres:
    image: postgres:15-alpine
    container_name: rag-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: rag_evaluation
      POSTGRES_USER: rag_user
      POSTGRES_PASSWORD: rag_password
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rag-backend
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: development
      DATABASE_URL: mongodb://admin:password@mongodb:27017/rag-evaluation
      POSTGRES_URL: postgresql://rag_user:rag_password@postgres:5432/rag_evaluation
      BACKEND_PORT: 5000
    depends_on:
      - mongodb
      - postgres
    volumes:
      - ./backend:/app/backend
    command: npm run dev

volumes:
  mongo_data:
  postgres_data:
