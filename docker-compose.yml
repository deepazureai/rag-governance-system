services:
  mongodb:
    image: mongo:latest
    container_name: v0-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: v0_db
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - v0-network

  postgres:
    image: postgres:latest
    container_name: v0-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: v0_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - v0-network

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: v0-backend
    restart: unless-stopped
    ports:
      - "5001:5001"
    environment:
      NODE_ENV: production
      PORT: 5001
      MONGODB_URI: mongodb://admin:password@mongodb:27017/v0_db?authSource=admin
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: v0_db
    depends_on:
      mongodb:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - v0-network

  poller:
    build:
      context: .
      dockerfile: poller/Dockerfile
    container_name: v0-poller
    restart: unless-stopped
    ports:
      - "5002:5002"
    environment:
      NODE_ENV: production
      PORT: 5002
      MONGODB_URI: mongodb://admin:password@mongodb:27017/v0_db?authSource=admin
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: v0_db
      BACKEND_URL: http://backend:5001
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - v0-network

  prompt-debugger:
    build:
      context: .
      dockerfile: services/prompt-debugger/Dockerfile
    container_name: v0-prompt-debugger
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      NODE_ENV: production
      PORT: 8001
      MONGODB_URI: mongodb://admin:password@mongodb:27017/v0_db?authSource=admin
      BACKEND_URL: http://backend:5001
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - v0-network

  knowledge-base:
    build:
      context: .
      dockerfile: services/knowledge-base/Dockerfile
    container_name: v0-knowledge-base
    restart: unless-stopped
    ports:
      - "8002:8002"
    environment:
      NODE_ENV: production
      PORT: 8002
      MONGODB_URI: mongodb://admin:password@mongodb:27017/v0_db?authSource=admin
      BACKEND_URL: http://backend:5001
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - v0-network

  template-creator:
    build:
      context: .
      dockerfile: services/template-creator/Dockerfile
    container_name: v0-template-creator
    restart: unless-stopped
    ports:
      - "8003:8003"
    environment:
      NODE_ENV: production
      PORT: 8003
      MONGODB_URI: mongodb://admin:password@mongodb:27017/v0_db?authSource=admin
      BACKEND_URL: http://backend:5001
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - v0-network

  deepeval:
    build:
      context: .
      dockerfile: deepeval-service/Dockerfile
    container_name: v0-deepeval
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DEEPEVAL_API_KEY: ${DEEPEVAL_API_KEY:-test-key}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/docs"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - v0-network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: v0-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      NEXT_PUBLIC_BACKEND_URL: http://localhost:5001
      NEXT_PUBLIC_DEEPEVAL_URL: http://localhost:8000
    depends_on:
      backend:
        condition: service_healthy
      deepeval:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - v0-network

volumes:
  mongo_data:
  postgres_data:

networks:
  v0-network:
    driver: bridge

